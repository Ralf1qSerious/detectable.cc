<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>detectable.cc — Blacklist</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body class="app-body">
<script>
  (function(){const t=localStorage.getItem('dlv_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
</script>

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-dot brand-dot-sm"></span>
      <span class="sidebar-brand-name">detectable<span class="brand-tld">.lv</span></span>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <a href="/dashboard.html" class="sidebar-link">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Sessions
      </a>
      <a href="/profiles.html" class="sidebar-link">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Profiles
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-username" id="sidebarUsername">—</div>
          <div class="sidebar-role" id="sidebarRoleLabel">Admin</div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm sidebar-logout" onclick="logout()" title="Sign out">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="app-main">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="topbar-title">Blacklist</h1>
        <span class="topbar-sub">Manage banned players by name or HWID</span>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
      </div>
    </header>

    <div class="app-content">

      <!-- Add player form -->
      <div class="bl-add-form">
        <div class="form-group">
          <label>Player Name</label>
          <input type="text" id="blName" placeholder="e.g. PlayerXYZ" maxlength="64" />
        </div>
        <div class="form-group" style="flex:2;min-width:220px">
          <label>Reason</label>
          <input type="text" id="blReason" placeholder="e.g. Cheating — VAC ban on record" maxlength="200" />
        </div>
        <button class="btn btn-primary" onclick="addToBlacklist()" style="align-self:flex-end">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add to Blacklist
        </button>
      </div>

      <!-- Blacklist table -->
      <div class="bl-table-wrap">
        <div class="bl-table-head">
          <span class="profile-section-title" style="margin:0">Banned Players <span id="blCount" style="color:var(--text-dim);font-weight:400;font-size:12px;text-transform:none;letter-spacing:0"></span></span>
          <input type="text" class="bl-search" id="blSearch" placeholder="Search player name…" oninput="filterTable()" />
        </div>
        <div id="blTableArea">
          <div style="text-align:center;padding:36px;color:var(--text-dim);font-size:13px">Loading…</div>
        </div>
      </div>

    </div>
  </div>

  <div id="toastContainer" style="position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:8px;z-index:9999"></div>

<script>
(function(){
  const token = localStorage.getItem('dlv_token');
  const role  = localStorage.getItem('dlv_role');
  const me    = localStorage.getItem('dlv_user');
  if (!token) { location.href = '/index.html'; return; }
  if (role !== 'admin') { location.href = '/dashboard.html'; return; }

  // ── Theme toggle ──────────────────────────────────────────────
  document.getElementById('themeToggle').addEventListener('click', () => {
    const cur  = document.documentElement.getAttribute('data-theme');
    const next = cur === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('dlv_theme', next);
    document.getElementById('themeToggle').textContent = next === 'light' ? '☀️' : '🌙';
  });
  (function syncThemeIcon(){
    const t = document.documentElement.getAttribute('data-theme');
    document.getElementById('themeToggle').textContent = t === 'light' ? '☀️' : '🌙';
  })();

  // ── Sidebar admin nav injection ──────────────────────────────
  const nav = document.getElementById('sidebarNav');
  const adminLinks = [
    { href: '/users.html',    icon: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>', label: 'Users' },
    { href: '/blacklist',     icon: '<circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>', label: 'Blacklist' },
    { href: '/audit.html',    icon: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>', label: 'Audit Log' },
    { href: '/settings.html', icon: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>', label: 'Settings' }
  ];
  adminLinks.forEach(l => {
    const a = document.createElement('a');
    a.href = l.href;
    a.className = 'sidebar-link' + (location.pathname === l.href ? ' active' : '');
    a.innerHTML = `<svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${l.icon}</svg>${l.label}`;
    nav.appendChild(a);
  });
  document.getElementById('sidebarUsername').textContent = me || '—';
  document.getElementById('sidebarAvatar').textContent   = (me || '?')[0].toUpperCase();

  // ── API helper ───────────────────────────────────────────────
  async function apiFetch(url, opts={}) {
    const r = await fetch(url, { ...opts, headers: { 'Content-Type':'application/json', Authorization:`Bearer ${token}`, ...(opts.headers||{}) } });
    if (r.status === 401) { localStorage.clear(); location.href='/index.html'; }
    return r;
  }

  function logout() { localStorage.clear(); location.href='/index.html'; }
  window.logout = logout;

  function toast(msg, type='info', dur=4000) {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    const icons = { info:'ℹ️', success:'✅', error:'❌', warn:'⚠️' };
    t.className = `toast ${type==='warn'?'toast-warn':''}`;
    t.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(() => t.remove(), dur);
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }) +
           ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
  }

  let allEntries = [];

  function renderTable(entries) {
    const area = document.getElementById('blTableArea');
    if (!entries.length) {
      area.innerHTML = '<div class="bl-empty">No banned players found.</div>';
      return;
    }
    area.innerHTML = `<table class="bl-table">
      <thead><tr>
        <th>Player Name</th>
        <th>Reason</th>
        <th>Added By</th>
        <th>Date</th>
        <th></th>
      </tr></thead>
      <tbody>${entries.map(e => `
        <tr>
          <td>
            <a href="/profiles/${encodeURIComponent(e.playerName)}" style="color:var(--text);font-weight:600">${escapeHtml(e.playerName)}</a>
          </td>
          <td style="color:var(--text-muted)">${escapeHtml(e.reason||'—')}</td>
          <td style="color:var(--text-dim)">${escapeHtml(e.addedBy||'—')}</td>
          <td style="color:var(--text-dim)">${fmtDate(e.addedAt)}</td>
          <td>
            <button class="btn btn-ghost btn-sm" style="color:var(--red);font-size:11px" onclick="removeEntry('${escapeHtml(e.playerName)}')">Remove</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }

  function filterTable() {
    const q = document.getElementById('blSearch').value.toLowerCase().trim();
    const filtered = q ? allEntries.filter(e => e.playerName.toLowerCase().includes(q)) : allEntries;
    renderTable(filtered);
  }
  window.filterTable = filterTable;

  async function loadBlacklist() {
    const r = await apiFetch('/api/blacklist');
    if (!r.ok) { toast('Failed to load blacklist','error'); return; }
    const d = await r.json();
    allEntries = d.blacklist || [];
    const countEl = document.getElementById('blCount');
    countEl.textContent = allEntries.length ? `(${allEntries.length})` : '';
    renderTable(allEntries);
  }

  async function addToBlacklist() {
    const name   = document.getElementById('blName').value.trim();
    const reason = document.getElementById('blReason').value.trim();
    if (!name) { toast('Player name required','warn'); return; }
    const r = await apiFetch('/api/blacklist', { method:'POST', body: JSON.stringify({ playerName: name, reason }) });
    if (r.ok) {
      document.getElementById('blName').value   = '';
      document.getElementById('blReason').value = '';
      toast(`"${name}" added to blacklist`,'success');
      loadBlacklist();
    } else {
      const e = await r.json();
      toast(e.error || 'Failed to add','error');
    }
  }
  window.addToBlacklist = addToBlacklist;

  async function removeEntry(name) {
    if (!confirm(`Remove "${name}" from blacklist?`)) return;
    const r = await apiFetch(`/api/blacklist/${encodeURIComponent(name)}`, { method:'DELETE' });
    if (r.ok) { toast(`"${name}" removed`,'success'); loadBlacklist(); }
    else { const e = await r.json(); toast(e.error || 'Failed to remove','error'); }
  }
  window.removeEntry = removeEntry;

  // Enter key on add form
  document.getElementById('blReason').addEventListener('keydown', e => { if(e.key==='Enter') addToBlacklist(); });
  document.getElementById('blName').addEventListener('keydown', e => { if(e.key==='Enter') addToBlacklist(); });

  loadBlacklist();
})();
</script>
</body>
</html>
